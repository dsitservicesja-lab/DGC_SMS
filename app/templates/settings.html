{% extends "base.html" %}
{% block title %}Settings - DGC SMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-gear"></i> Settings</h2>
</div>

<div class="row">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header"><h5 class="mb-0">Email Notifications</h5></div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="email_enabled" name="email_enabled" {% if email_enabled %}checked{% endif %}>
                        <label class="form-check-label" for="email_enabled">
                            Enable email notifications
                        </label>
                    </div>
                    <p class="text-muted small">
                        When disabled, in-app notifications will still be created but no emails will be sent.
                        Useful for testing or when the mail server is not configured.
                    </p>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Save Settings
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
