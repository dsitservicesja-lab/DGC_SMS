{% extends "base.html" %}
{% block title %}Notifications - DGC SMS{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-bell"></i> Notifications</h2>
</div>

{% if notifications %}
<div class="card">
    <div class="list-group list-group-flush">
        {% for notif in notifications %}
        <form method="POST" action="{{ url_for('main.mark_notification_read', notif_id=notif.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit"
                    class="list-group-item list-group-item-action border-start-0 border-end-0 py-3 text-start
                           {% if not notif.is_read %}bg-light{% endif %}">
                <div class="d-flex justify-content-between align-items-start gap-3">
                    <div class="d-flex gap-3 align-items-start flex-grow-1">
                        <div style="width:12px; flex-shrink:0; padding-top:4px;">
                            {% if not notif.is_read %}
                            <i class="bi bi-circle-fill text-primary" style="font-size:.5rem;"></i>
                            {% endif %}
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-semibold mb-1 d-flex align-items-center gap-2">
                                {{ notif.title }}
                                {% if not notif.is_read %}
                                <span class="badge bg-primary" style="font-size:.65rem; font-weight:500;">New</span>
                                {% endif %}
                            </div>
                            <div class="text-muted" style="font-size:.8rem;">{{ notif.message }}</div>
                        </div>
                    </div>
                    <small class="text-muted text-nowrap" style="font-size:.75rem;">
                        {{ notif.created_at.strftime('%d %b %Y %H:%M') }}
                    </small>
                </div>
            </button>
        </form>
        {% endfor %}
    </div>
</div>
{% else %}
<div class="text-center text-muted py-5">
    <i class="bi bi-bell-slash d-block mb-3" style="font-size:3rem;"></i>
    <p class="mb-0">No notifications yet.</p>
</div>
{% endif %}
{% endblock %}
