{% extends "base.html" %}
{% block title %}Notifications - DGC SMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-bell"></i> Notifications</h2>
</div>

{% if notifications %}
<div class="list-group">
    {% for notif in notifications %}
    <form method="POST" action="{{ url_for('main.mark_notification_read', notif_id=notif.id) }}" class="d-inline">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit" class="list-group-item list-group-item-action {% if not notif.is_read %}list-group-item-info{% endif %}">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h6 class="mb-1">
                        {% if not notif.is_read %}<i class="bi bi-circle-fill text-primary small"></i>{% endif %}
                        {{ notif.title }}
                    </h6>
                    <p class="mb-1">{{ notif.message }}</p>
                </div>
                <small class="text-muted text-nowrap ms-3">{{ notif.created_at.strftime('%d %b %Y %H:%M') }}</small>
            </div>
        </button>
    </form>
    {% endfor %}
</div>
{% else %}
<div class="text-center text-muted py-5">
    <i class="bi bi-bell-slash display-4"></i>
    <p class="mt-2">No notifications yet.</p>
</div>
{% endif %}
{% endblock %}
