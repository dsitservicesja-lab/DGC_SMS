# HTTPS on port 8080 — avoids conflict with Nextcloud which occupies ports 80/443.
# Access the app at https://<server-ip>:8080
# Note: port 8080 must be open in the server firewall (ufw allow 8080/tcp).
server {
    listen 8080 ssl;
    server_name YOUR_DOMAIN_OR_IP;

    ssl_certificate     /etc/ssl/dgc_sms/dgc_sms.crt;
    ssl_certificate_key /etc/ssl/dgc_sms/dgc_sms.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 16M;

    # Security headers
    # Short max-age is intentional: self-signed certs may be rotated or replaced.
    add_header Strict-Transport-Security "max-age=86400" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Full-database import uploads can be large; raise limits for this route only.
    # ^~ prefix match wins over location / and handles trailing slashes / query strings.
    location ^~ /import-data {
        client_max_body_size 500M;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60;
        proxy_send_timeout    300;
        proxy_read_timeout    300;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    location /static {
        alias /opt/dgc_sms/app/static;
        expires 30d;
    }
}
