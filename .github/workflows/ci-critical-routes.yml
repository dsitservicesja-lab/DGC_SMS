name: CI Critical Routes

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  critical-routes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for unresolved merge markers
        run: |
          if grep -RInE "^(<<<<<<<|=======|>>>>>>>)" \
              --exclude-dir=.git \
              --exclude-dir=.venv \
              --exclude-dir=__pycache__ \
              --exclude-dir=.pytest_cache \
              .; then
            echo "Unresolved merge markers found."
            exit 1
          fi

      - name: Run critical route smoke tests
        env:
          PYTHONPATH: .
        run: pytest -q tests/test_critical_routes.py
